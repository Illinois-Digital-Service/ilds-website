name: Accessibility Scan and Preview Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  a11y-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Serve built site locally
        run: |
          cd _site
          python3 -m http.server 4000 &
          echo $! > ../server.pid

      - name: Install Pa11y CI
        run: npm install -g pa11y-ci

      - name: Run accessibility scans against main pages
        run: |
          # Give the HTTP server a moment to start
          sleep 5

          pa11y-ci

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  preview-build:
    runs-on: ubuntu-latest
    needs: a11y-scan
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "/${{ github.ref_name }}"
        env:
          JEKYLL_ENV: production
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ github.ref_name }}

      - name: Print preview URL
        run: |
          echo ""
          echo "============================================"
          echo "✅ Preview deployed!"
          echo ""
          echo ""
          echo "🔗 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.ref_name }}/"
          echo "============================================"
          echo ""

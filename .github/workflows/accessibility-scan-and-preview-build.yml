name: Accessibility Scan and Preview Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  a11y-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Serve built site locally
        run: |
          cd _site
          python3 -m http.server 4000 &
          echo $! > ../server.pid

      - name: Install Pa11y CI
        run: npm install -g pa11y-ci

      - name: Run accessibility scans against main pages
        run: |
          # Give the HTTP server a moment to start
          sleep 5

          pa11y-ci

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  preview-build:
    runs-on: ubuntu-latest
    needs: a11y-scan
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        # Definition: github.ref_name is the short name of the branch or tag
        # that triggers the workflow run.
        run: bundle exec jekyll build --baseurl "preview-deploy/${{ github.ref_name }}"
        env:
          JEKYLL_ENV: production
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: "preview-deploy/${{ github.ref_name }}"

      - name: Preview URL
        run: |
          PREVIEW_URL="https://illinoisdigitalservice.org/preview-deploy/${{ github.ref_name }}/"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "::notice::Preview deployed: $PREVIEW_URL"
          echo "## ✅ Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Preview URL:** [$PREVIEW_URL]($PREVIEW_URL)" >> $GITHUB_STEP_SUMMARY
        id: preview-url

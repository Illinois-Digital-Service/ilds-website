name: Accessibility Scan and Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  a11y-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node (for Pa11y CI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm (for Pa11y CI install)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-pa11y-ci

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Serve built site locally
        run: |
          cd _site
          python3 -m http.server 4000 &
          echo $! > ../server.pid

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:4000/ > /dev/null && break
            sleep 1
          done

      - name: Install Pa11y CI
        run: npm install -g pa11y-ci

      - name: Run accessibility scans against main pages
        run: pa11y-ci

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  preview-build:
    runs-on: ubuntu-latest
    needs: a11y-scan
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (full for main + current ref)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build production site (from main)
        env:
          JEKYLL_ENV: production
        run: |
          git checkout main
          bundle exec jekyll build
          mv _site _site_production
          git checkout ${{ github.sha }}

      - name: Build preview site (current ref)
        run: |
          bundle exec jekyll build --baseurl "/preview-deploy/${{ github.ref_name }}"
        env:
          JEKYLL_ENV: production

      - name: Merge into Pages artifact
        run: |
          mkdir -p pages-artifact/preview-deploy/${{ github.ref_name }}
          cp -r _site_production/. pages-artifact/
          cp -r _site/. pages-artifact/preview-deploy/${{ github.ref_name }}/

      - name: Debug - list artifact contents
        run: |
          echo "Artifact root:"
          ls -la pages-artifact/
          echo ""
          echo "Preview path:"
          ls -la pages-artifact/preview-deploy/${{ github.ref_name }}/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Preview URL
        run: |
          PREVIEW_URL="https://illinoisdigitalservice.org/preview-deploy/${{ github.ref_name }}/"
          echo "## ✅ Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Preview URL:** [$PREVIEW_URL]($PREVIEW_URL)" >> $GITHUB_STEP_SUMMARY

name: Preview Build and Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (full for main + current ref)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build production site (from main)
        env:
          JEKYLL_ENV: production
        run: |
          git checkout main
          bundle exec jekyll build
          mv _site _site_production
          git checkout ${{ github.sha }}

      - name: Build preview site (current ref)
        run: |
          bundle exec jekyll build --baseurl "/preview-deploy/${{ github.ref_name }}"
        env:
          JEKYLL_ENV: production

      - name: Merge into Pages artifact
        run: |
          mkdir -p pages-artifact/preview-deploy/${{ github.ref_name }}
          cp -r _site_production/. pages-artifact/
          cp -r _site/. pages-artifact/preview-deploy/${{ github.ref_name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Preview URL
        run: |
          PREVIEW_URL="https://illinoisdigitalservice.org/preview-deploy/${{ github.ref_name }}/"
          echo "## ✅ Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Preview URL:** [$PREVIEW_URL]($PREVIEW_URL)" >> $GITHUB_STEP_SUMMARY

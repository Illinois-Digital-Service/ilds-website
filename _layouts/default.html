<!doctype html>
<html lang="en">

<head>
  {% if jekyll.environment == "production" %}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-35EMJNHF0J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-35EMJNHF0J');
  </script>
  {% endif %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  {% if jekyll.environment == "preview" %}
  <meta name="robots" content="noindex, nofollow">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>

<body class="{% if jekyll.environment == 'preview' %}has-preview-banner{% endif %}">
  {% if jekyll.environment == "preview" %}
  <div class="preview-banner" role="status" aria-label="Preview environment">
    preview!
  </div>
  {% endif %}
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {%- include header.html -%}
  <main id="main-content">
    {{ content }}
  </main>
  {%- include footer.html -%}
</body>

</html>
